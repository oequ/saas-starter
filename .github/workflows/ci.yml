name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use npm 11 (lockfile generated with npm 11)
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx nx run-many -t lint --all

      - name: Unit tests
        run: npx nx run-many -t test --projects=ports

      - name: Build demo
        run: npx nx build demo

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E (demo)
        run: npx nx e2e demo-e2e

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use npm 11
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Reset database
        run: supabase db reset

      - name: Web Supabase settings
        run: node scripts/write-web-supabase-settings.mjs

      - name: Build web
        run: npx nx build web

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E (web @web)
        run: npm run e2e:web:release
