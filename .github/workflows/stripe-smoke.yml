# Nightly API-only Stripe smoke (Edge Functions + webhook + Postgres).
# Not a required PR check. Add repo secrets — see docs/STRIPE_LOCAL.md.

name: Stripe smoke

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: stripe-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stripe-api-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use npm 11
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Reset database
        run: supabase db reset

      - name: Export Supabase env
        run: supabase status -o env >> $GITHUB_ENV

      - name: Write supabase/.env for Edge Functions
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_TEAM: ${{ secrets.STRIPE_PRICE_TEAM }}
        run: |
          cat > supabase/.env <<EOF
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
          STRIPE_PRICE_TEAM=${STRIPE_PRICE_TEAM}
          EOF

      - name: Start Edge Functions
        run: |
          npm run functions:serve >> functions-serve.log 2>&1 &
          echo $! > functions-serve.pid

      - name: Stripe API smoke
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_TEAM: ${{ secrets.STRIPE_PRICE_TEAM }}
        run: npm run stripe:smoke:ci

      - name: Upload functions log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: functions-serve-log
          path: functions-serve.log

      - name: Stop Edge Functions
        if: always()
        run: |
          if [ -f functions-serve.pid ]; then
            kill "$(cat functions-serve.pid)" 2>/dev/null || true
          fi
