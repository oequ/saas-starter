<div
  class="showcase-page bg-background text-foreground flex min-h-svh items-center justify-center p-4 sm:p-6 lg:p-8"
  [class.showcase-page--capture]="captureMode()"
>
  <div
    class="showcase-page-frame w-full max-w-[67.1875rem]"
    (mouseenter)="onFrameEnter()"
    (mouseleave)="onFrameLeave()"
  >
    <ac-showcase-frame
      [activeScene]="activeScene()"
      [paused]="paused()"
      [manualScene]="manualScene()"
      [captureMode]="captureMode()"
      (sceneChange)="onSceneChange($event)"
    />
  </div>
</div>
