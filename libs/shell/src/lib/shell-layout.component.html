<div hlmSidebarWrapper>
  <hlm-sidebar>
    <div hlmSidebarHeader class="px-2 pt-1">
      <oequ-workspace-switcher />
    </div>

    <div hlmSidebarContent class="pt-2">
      <div hlmSidebarGroup class="p-0">
        <div hlmSidebarGroupContent class="px-2">
          <ul hlmSidebarMenu class="!gap-px">
            @for (item of navItems(); track item.path) {
              <li hlmSidebarMenuItem>
                <a
                  hlmSidebarMenuButton
                  class="!h-9 !gap-0 !p-0 font-normal text-gray-900 hover:!bg-gray-100 hover:!text-gray-900 data-[active=true]:!bg-gray-200 data-[active=true]:!font-normal data-[active=true]:!text-gray-900 data-[active=true]:hover:!bg-gray-200"
                  [routerLink]="item.path"
                  routerLinkActive
                  #navLink="routerLinkActive"
                  [isActive]="navLink.isActive"
                  [routerLinkActiveOptions]="{ exact: item.exact }"
                >
                  <div class="grid size-9 shrink-0 place-content-center">
                    <ng-icon hlm class="!size-4" [name]="item.icon" />
                  </div>
                  <span class="min-w-0 flex-1 truncate text-sm font-normal">{{
                    item.label
                  }}</span>
                </a>
              </li>
            }
          </ul>
        </div>
      </div>
    </div>

    <div hlmSidebarFooter class="mt-auto border-border border-t p-2">
      <oequ-user-menu />
    </div>
  </hlm-sidebar>

  <main
    hlmSidebarInset
    class="flex h-svh min-h-0 flex-1 flex-col overflow-hidden"
  >
    <header
      class="border-border bg-background sticky top-0 z-20 flex h-14 shrink-0 items-center gap-3 border-b px-4"
    >
      <button hlmSidebarTrigger type="button" aria-label="Toggle sidebar">
        <span class="sr-only">Toggle sidebar</span>
      </button>

      <nav hlmBreadcrumb aria-label="Breadcrumb" class="flex-1">
        <ol hlmBreadcrumbList>
          <li hlmBreadcrumbItem>
            <a hlmBreadcrumbLink [link]="breadcrumbRoot()">{{
              breadcrumbRootLabel()
            }}</a>
          </li>
          <li hlmBreadcrumbSeparator></li>
          <li hlmBreadcrumbItem>
            <span hlmBreadcrumbPage>{{ pageTitle() }}</span>
          </li>
        </ol>
      </nav>
    </header>

    <section class="min-h-0 flex-1 overflow-y-auto p-6">
      <div class="mx-auto w-full max-w-[1200px]">
        <router-outlet />
      </div>
    </section>
  </main>
</div>
